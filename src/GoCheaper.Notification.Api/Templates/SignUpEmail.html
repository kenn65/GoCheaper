<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /></head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 24px;">
    <h1 style="color: #0d6efd;">GoCheaper</h1>
    <p>Hi {{FullName}}</p>
    <p>Thank you for signing up with GoCheaper!</p>
    <p>To activate your account please click the link below:</p>
    <p style="margin: 24px 0;">
        <a href="{{VerificationLink}}"
           style="background-color: #0d6efd; color: #fff; padding: 12px 24px; text-decoration: none; border-radius: 4px;">
            Confirm your account
        </a>
    </p>
    <p>If the button does not work, copy and paste this link into your browser:<br />
        <a href="{{VerificationLink}}">{{VerificationLink}}</a>
    </p>
    <p>Have a great day</p>
    <h3 style="color: #0d6efd;">GoCheaper</h3>
</body>
</html>
