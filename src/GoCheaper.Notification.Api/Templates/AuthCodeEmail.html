<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8" /><meta name="viewport" content="width=device-width, initial-scale=1" /></head>
<body style="font-family: Arial, sans-serif; color: #333; max-width: 600px; margin: 0 auto; padding: 24px;">
    <h1 style="color: #0d6efd;">Go Cheaper Authentication</h1>
    <p>Hi {{FullName}}</p>
    <p>We have received your request to log in to Go Cheaper. Please enter the code below.</p>
    <div style="display: inline-block; margin: 16px 0; padding: 16px 32px;
                font-size: 32px; font-weight: bold; letter-spacing: 8px;
                color: cornflowerblue; border: 2px solid cornflowerblue;
                border-radius: 4px; text-align: center;">
        {{Code}}
    </div>
    <p>This code expires in 10 minutes. If you did not request this, you can safely ignore this email.</p>
    <p>Have a great day</p>
    <h3 style="color: #0d6efd;">Go Cheaper</h3>
</body>
</html>
